<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locked Calendar</title>
    <script src="/js/superUtil.js"></script>
    <script src="/js/lockscreen.js"></script>
    <style>
        *{
            padding: 0;
            margin:0;
        }
        body{
            background-image: url("/img/lockscreenBg.jpg");
        }
        #errorMessages{
            color:red;
            font-weight: bold;
        }
        .passcodeWrapper{
            position: absolute;
            bottom:50%;
            /* background-color: rgba(0, 0, 0, 0.2); */
            padding: 150px 0px 150px 0px;
            width: 100%;
            color:white;
            font-family:Verdana, Geneva, Tahoma, sans-serif;
            margin: 0 auto;
            text-align: center;
            top:10%;
        }
            .passcodeWrapper h1{
                text-shadow: 1px 1px 5px black;
            }
        #enterBtn {
            cursor: pointer;
        }
        button{
            padding:10px;
            margin: 0px;
            background-color: #424242;
            color:white;
            outline: none;
            border:none;
            cursor: pointer;
            border-radius: 5px;
        }

        .contentWrapper{
            background-color: rgba(0, 0, 0, 0.5);
            width: 180px;
            margin:0 auto;
            padding: 30px;
            border-radius: 20px;
        }
        #subText{
            font-size: 10pt;
        }
            
    </style>
</head>
<body>
    <div class="passcodeWrapper">
        <div class="contentWrapper">
            <h1>Calendar</h1>
            <br>
            <br>
            <span id="subText"><i>Enter password</i></span>
            <br>
            
            <input type="password" id="passwordInput">
            <br><br>
            <button onclick="unlockCalendar();" id="enterBtn">Enter</button>
            <br>
            <span id="errorMessages"></span>
        </div>
    </div>    
</body>
</html>
